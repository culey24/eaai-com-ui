services:
  db:
    # Cần extension pgvector (FAQ embedding). Image chính thức: https://github.com/pgvector/pgvector
    image: pgvector/pgvector:pg16
    container_name: eaai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eaai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eaai_dev_change_me}
      POSTGRES_DB: eaai_com
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - eaai_pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

volumes:
  eaai_pg_data:

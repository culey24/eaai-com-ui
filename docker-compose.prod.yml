# Production / staging: API + SPA + Postgres (init SQL lần đầu).
#
# Chuẩn bị:
#   cp prod.compose.env.example .env.deploy
#   # Sửa JWT_SECRET, POSTGRES_PASSWORD, VITE_API_URL, CORS_ORIGINS
#
# Chạy:
#   docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --build
#
# Kiểm tra: http://localhost:8080 (web), http://localhost:3000/health (api)

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: eaai-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: eaai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eaai_com
    volumes:
      - eaai_pg_prod:/var/lib/postgresql/data
      - ./backend/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eaai -d eaai_com']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eaai-api-prod
    restart: unless-stopped
    volumes:
      - eaai_uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3000
      JOURNAL_UPLOAD_DIR: uploads/journals
      DATABASE_URL: postgresql://eaai:${POSTGRES_PASSWORD}@db:5432/eaai_com?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-eaai-com}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${API_PORT:-3000}:3000'

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: eaai-web-prod
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  eaai_pg_prod:
  eaai_uploads:

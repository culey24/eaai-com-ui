services:
  db:
    image: postgres:16-alpine
    container_name: eaai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eaai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eaai_dev_change_me}
      POSTGRES_DB: eaai_com
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - eaai_pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

volumes:
  eaai_pg_data:
